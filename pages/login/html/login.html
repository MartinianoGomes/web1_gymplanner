<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GYMPlanner - Login</title>
    <link rel="stylesheet" href="../styles/style.css" />
  </head>
  <body>
    <div class="container">
      <div class="form-section">
        <div class="logo">
          <span>
            <img src="../assets/logo.svg" alt="Logo GymPlanner" />
          </span>
        </div>

        <form class="form" id="loginForm">
          <h2>Entrar</h2>
          <p class="subtitle">
            Faça login na sua conta e aproveite todos os benefícios
            gratuitamente.
          </p>
          <div class="form-input">
            <label for="email">E-mail</label>
            <input
              type="email"
              id="email"
              placeholder="Digite seu e-mail"
              required
            />
          </div>

          <div class="form-input">
            <label for="senha">Senha</label>
            <input
              type="password"
              id="password"
              placeholder="Digite sua senha"
              required
            />
          </div>

          <button type="submit">Entrar</button>

          <p class="signup">
            Não possui conta?
            <a href="../../cadastro/html/cadastro.html"
              >Clique aqui e realize seu cadastro</a
            >
          </p>
        </form>
      </div>

      <div class="image-section"></div>
    </div>
  </body>
</html>
