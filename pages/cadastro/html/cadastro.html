<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="stylesheet" href="../styles/style.css">
    <link rel="stylesheet" href="../../../components/sidebar/sidebar.css">

    <title>GymPlanner - Cadastre-se</title>
</head>
<body>
    <div id="sidebar-container" class="sidebar-container"></div>
    <div class="container">

        <div class="image-section">
            <img src="../assets/images/mulher-bonita-gosta-de-zumba 1.svg" alt="Mulher fazendo exercício flexionando o braço">
        </div>

        <div class="form-section">
            <div class="form-container">

                <div class="logo">
                    <span>
                        <img src="../assets/logo/logo.svg" alt="Logo GymPlanner">
                    </span>
                </div>
                                
                <div class="heading">
                    <h2>Cadastre-se</h2>
                    <p>Realize seu cadastro na nossa plataforma e aproveite todos os benefícios gratuitamente.</p>
                </div>
                                
                <form class="form" id="signupForm">
                    <div class="form-group">
                        <label for="name">Nome</label>
                        <input type="text" id="name" name="name" placeholder="Digite seu nome" required>
                    </div>
                    <div class="form-group">
                        <label for="email">E-mail</label>
                        <input type="email" id="email" name="email" placeholder="Digite seu e-mail" required>
                    </div>
                    <div class="form-group">
                        <label for="password">Senha</label>
                        <input type="password" id="password" name="password" placeholder="Digite sua senha" required>
                    </div>
                    <div class="form-group">
                        <label for="confirm-password">Confirmar senha</label>
                        <input type="password" id="confirm-password" name="confirm-password" placeholder="Confirme sua senha" required>
                    </div>
                    <button type="submit" class="submit-btn">Cadastrar</button>
                </form>
                
                <div id="errorMessage" class="error-message" style="display: none;">
                    <p><span id="errorText"></span></p>
                </div>
                                
                <div class="login-link">
                    <p>Já possui conta? <a href="../../login/html/login.html">Clique aqui e realize seu login</a></p>
                </div>
                                
            </div>
        </div>
    </div>

    <script src="javascript/script.js"></script>
    <script>
      fetch('../../../components/sidebar/sidebar.html')
        .then(res => res.text())
        .then(data => {
          document.getElementById('sidebar-container').innerHTML = data;

          const script = document.createElement('script');
          script.src = '../../../components/sidebar/sidebar.js';
          document.body.appendChild(script);
        })
        .catch(err => console.error('Erro ao carregar sidebar:', err));
    </script>
  </body>
</body>
</html>
